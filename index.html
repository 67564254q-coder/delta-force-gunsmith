  <!-- Authing Guard -->
  
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0b0d14;
      --bg-card: #14171f;
      --bg-card-hover: #1a1e2b;
      --bg-code: #1e2333;
      --text: #e8eaed;
      --text-muted: #9aa0a8;
      --text-secondary: #b0b6c2;
      --accent: #f0c040;
      --accent-dim: #b8941a;
      --accent-glow: rgba(240, 192, 64, 0.15);
      --border: #252a38;
      --border-hover: #3a4055;
      --red: #e06c6c;
      --green: #7dcf7d;
      --blue: #6cb4ee;
      --purple: #b07cd8;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 2px 12px rgba(0,0,0,0.4);
      --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      --mono: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

    /* ===== Header ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(11, 13, 20, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .logo-icon { font-size: 28px; }
    .logo-sub {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 1px;
    }
    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-controls .count-badge {
      font-size: 13px;
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    /* ===== User Menu ===== */
    .user-area {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .user-login-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .user-login-btn:hover {
      border-color: var(--accent-dim);
      color: var(--accent);
      background: var(--accent-glow);
    }
    .user-avatar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 4px 8px 4px 4px;
      border-radius: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      transition: all 0.2s;
      position: relative;
    }
    .user-avatar-wrap:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
    }
    .user-avatar-img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--bg-code);
    }
    .user-nickname {
      font-size: 13px;
      color: var(--text);
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .user-arrow {
      font-size: 10px;
      color: var(--text-muted);
      transition: transform 0.2s;
    }
    .user-arrow.open { transform: rotate(180deg); }
    .user-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 160px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px;
      display: none;
      z-index: 200;
      box-shadow: var(--shadow);
    }
    .user-dropdown.open { display: block; }
    .user-dropdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .user-dropdown-item:hover {
      background: var(--bg-card-hover);
      color: var(--text);
    }
    .user-dropdown-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 8px;
    }
    .user-dropdown-item.logout-item {
      color: var(--red);
    }
    .user-dropdown-item.logout-item:hover {
      background: rgba(224,108,108,0.1);
    }

    /* ===== Login Modal ===== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
      animation: modalFadeIn 0.2s ease;
    }
    .modal-overlay.open { display: flex; }
    @keyframes modalFadeIn { from { opacity:0; } to { opacity:1; } }
    .modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      animation: modalSlideUp 0.25s ease;
    }
    @keyframes modalSlideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }
    .modal-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .modal-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .modal-close {
      float: right;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }
    .modal-close:hover { color: var(--text); }
    .login-btns {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.2s;
      color: #fff;
    }
    .login-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
    }
    .login-btn:active {
      transform: translateY(0);
    }
    .login-btn.qq {
      background: linear-gradient(135deg, #12b7f5, #0099ff);
    }
    .login-btn.wechat {
      background: linear-gradient(135deg, #09b83e, #07c160);
    }
    .login-btn .login-icon {
      font-size: 22px;
    }
    .modal-note {
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
    }

/* ===== Stats Bar ===== */
    .stats-bar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 24px;
      padding: 16px 24px 0;
      flex-wrap: wrap;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .stat-item strong { color: var(--text); font-weight: 600; }

    /* ===== Search & Filters ===== */
    .controls {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .search-wrap .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .filter-btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-btn:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
      color: var(--text);
    }
    .filter-btn.active {
      border-color: var(--accent-dim);
      background: var(--accent-glow);
      color: var(--accent);
    }
    .filter-btn.clear-btn {
      color: var(--text-muted);
      font-size: 12px;
      opacity: 0.6;
    }
    .filter-btn.clear-btn:hover { opacity: 1; }
    .filter-btn.fav-filter {
      border-color: var(--red);
      color: var(--red);
    }
    .filter-btn.fav-filter.active {
      background: rgba(224,108,108,0.15);
    }
    .filter-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* ===== Grid ===== */
    .grid-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    /* ===== Card ===== */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border 0.2s, background 0.2s, transform 0.15s, box-shadow 0.2s;
      cursor: default;
      position: relative;
    }
    .card:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.3;
      flex: 1;
    }
    .card-category {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
      letter-spacing: 0.5px;
    }
    .cat-ar     { background: rgba(108,180,238,0.15); color: var(--blue); }
    .cat-sm-g   { background: rgba(124,207,124,0.15); color: var(--green); }
    .cat-dmr    { background: rgba(176,124,216,0.15); color: var(--purple); }
    .cat-sr     { background: rgba(224,108,108,0.15); color: var(--red); }
    .cat-lmg    { background: rgba(240,192,64,0.15); color: var(--accent); }
    .cat-sg     { background: rgba(240,192,64,0.10); color: #e0a040; }
    .cat-pistol { background: rgba(180,180,200,0.15); color: #b8bcd0; }

    .card-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .card-meta span { display: flex; align-items: center; gap: 4px; }

    .card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 12px;
    }
    .tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      background: var(--bg-code);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .code-block {
      background: var(--bg-code);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      word-break: break-all;
      cursor: pointer;
      transition: border 0.2s, background 0.2s;
      position: relative;
    }
    .code-block:hover {
      border-color: var(--accent-dim);
      background: rgba(240,192,64,0.05);
    }
    .code-block .code-text {
      flex: 1;
      min-width: 0;
      line-height: 1.4;
    }
    .code-block .copy-btn {
      flex-shrink: 0;
      font-size: 16px;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
      padding: 2px;
    }
    .code-block .copy-btn:hover { opacity: 1; }
    .code-block .copied-toast {
      position: absolute;
      top: -30px;
      right: 0;
      background: var(--accent);
      color: #000;
      font-family: var(--font);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      font-weight: 600;
    }
    .code-block .copied-toast.show { opacity: 1; }

    /* ===== Favorite Heart ===== */
    .fav-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 20px;
      cursor: pointer;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      background: none;
      border: none;
      line-height: 1;
      padding: 2px;
    }
    .card:hover .fav-btn { opacity: 0.7; }
    .fav-btn:hover { opacity: 1 !important; transform: scale(1.15); }
    .fav-btn.favored { opacity: 1 !important; }

    /* ===== User Badge ===== */
    .user-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      background: rgba(240,192,64,0.12);
      color: var(--accent);
      border: 1px solid rgba(240,192,64,0.25);
      display: inline-flex;
      align-items: center;
      gap: 3px;
      margin-right: 6px;
    }

    /* ===== Comment Section ===== */
    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .card-action-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      background: var(--bg-code);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
    }
    .card-action-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: var(--bg-card-hover);
    }
    .card-action-btn .comment-count {
      font-size: 11px;
      background: var(--border);
      padding: 1px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
    }
    .comment-section {
      margin-top: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, margin-top 0.3s ease, padding-top 0.3s ease;
    }
    .comment-section.open {
      max-height: 600px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .comment-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
      max-height: 280px;
      overflow-y: auto;
    }
    .comment-item {
      display: flex;
      gap: 8px;
      padding: 8px 10px;
      background: var(--bg-code);
      border-radius: var(--radius-sm);
      position: relative;
    }
    .comment-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      background: var(--bg-card);
    }
    .comment-body {
      flex: 1;
      min-width: 0;
    }
    .comment-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }
    .comment-nickname {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .comment-time {
      font-size: 11px;
      color: var(--text-muted);
    }
    .comment-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
      word-break: break-word;
    }
    .comment-delete {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
      background: none;
      border: none;
      padding: 2px 4px;
    }
    .comment-item:hover .comment-delete { opacity: 0.5; }
    .comment-delete:hover { opacity: 1 !important; color: var(--red); }
    .comment-input-wrap {
      display: flex;
      gap: 8px;
    }
    .comment-input {
      flex: 1;
      padding: 8px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      outline: none;
      transition: border 0.2s;
    }
    .comment-input:focus {
      border-color: var(--accent-dim);
    }
    .comment-input::placeholder { color: var(--text-muted); }
    .comment-submit {
      padding: 8px 14px;
      background: var(--accent-dim);
      border: none;
      border-radius: var(--radius-sm);
      color: #000;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .comment-submit:hover { background: var(--accent); }

    /* ===== Empty / No results ===== */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .big-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 14px; }

    /* ===== Share Build Button ===== */
    .share-fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f0c040, #d4a020);
      border: none;
      color: #000;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(240,192,64,0.35);
      transition: all 0.25s;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;

// ============================================================
//  LOCAL STORAGE HELPERS
// ============================================================
const LS_KEY_USER    = 'df_gunsmith_user';
const LS_KEY_FAVS    = 'df_gunsmith_favorites';
const LS_KEY_COMMENTS = 'df_gunsmith_comments';
const LS_KEY_USER_BUILDS = 'df_gunsmith_user_builds';

function getLS(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e) { return fallback; }
}
function setLS(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

// ============================================================
//  USER / AUTH
// ============================================================
function getCurrentUser() {
  return getLS(LS_KEY_USER, null);
}
function setCurrentUser(user) {
  if (user) setLS(LS_KEY_USER, user);
  else localStorage.removeItem(LS_KEY_USER);
  updateUserUI();
}
function isLoggedIn() {
  return !!getCurrentUser();
}

// ============================================================
//  FAVORITES
// ============================================================
function getFavorites() {
  return getLS(LS_KEY_FAVS, {});
}
function toggleFavorite(buildId) {
  const favs = getFavorites();
  if (favs[buildId]) delete favs[buildId];
  else favs[buildId] = true;
  setLS(LS_KEY_FAVS, favs);
  render();
}

// ============================================================
//  COMMENTS
// ============================================================
function getComments(buildId) {
  const all = getLS(LS_KEY_COMMENTS, {});
  return all[buildId] || [];
}
function addComment(buildId, text) {
  const user = getCurrentUser();
  if (!user) return;
  const all = getLS(LS_KEY_COMMENTS, {});
  if (!all[buildId]) all[buildId] = [];
  all[buildId].push({
    id: Date.now() + '_' + Math.random().toString(36).slice(2,6),
    userId: user.id,
    nickname: user.nickname,
    avatar: user.avatar,
    text: text.trim(),
    time: Date.now()
  });
  setLS(LS_KEY_COMMENTS, all);
}
function deleteComment(buildId, commentId) {
  const all = getLS(LS_KEY_COMMENTS, {});
  if (!all[buildId]) return;
  all[buildId] = all[buildId].filter(c => c.id !== commentId);

function handleQQCallback() {
  const hash = window.location.hash;
  if (!hash) return false;
  const params = new URLSearchParams(hash.substring(1));
  const code = params.get("code");
  if (code) {
    fetch("https://qq-auth.67564254q.workers.dev/api/exchange?code=" + encodeURIComponent(code))
      .then(r => r.json())
      .then(data => {
        if (data.ok && data.user) {
          setCurrentUser(data.user);
          history.replaceState(null, "", window.location.pathname);
          closeLoginModal();
          render();
        } else {
          alert("登录失败: " + (data.msg || data.error));
          closeLoginModal();
        }
      })
      .catch(e => {
        alert("网络错误: " + e.message);
        closeLoginModal();
      });
    return true;
  }
  const error = params.get("login_error");
  if (error) {
    alert("登录失败: " + decodeURIComponent(error));
    history.replaceState(null, "", window.location.pathname);
    closeLoginModal();
    return true;
  }
  return false;

function renderComments(buildId) {
  const comments = getComments(buildId);
  const user = getCurrentUser();
  if (comments.length === 0) return '<div style="text-align:center;padding:12px;color:var(--text-muted);font-size:13px;">閺嗗倹妫ょ拠鍕啈閿涘本娼甸幎銏＄煓閸?棣冩巢閿?/div>';
  return comments.map(c => {
    const isOwner = user && c.userId === user.id;
    const timeStr = formatTime(c.time);
    return `
      <div class="comment-item">
        <div class="comment-avatar">${c.avatar ? `<img src="${c.avatar}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;" onerror="this.style.display='none'" />` : '棣冩尠'}</div>
        <div class="comment-body">
          <div class="comment-meta">
            <span class="comment-nickname">${c.nickname}</span>
            <span class="comment-time">${timeStr}</span>
          </div>
          <div class="comment-text">${escapeHtml(c.text)}</div>
        </div>
        ${isOwner ? `<button class="comment-delete" onclick="deleteCommentById('${buildId}','${c.id}')" title="閸掔娀娅庣拠鍕啈">閴?/button>` : ''}
      </div>
    `;
  }).join('');
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return '閸掓艾鍨?;
  if (diff < 3600) return Math.floor(diff/60) + '閸掑棝鎸撻崜?;
  if (diff < 86400) return Math.floor(diff/3600) + '鐏忓繑妞傞崜?;
  if (diff < 172800) return '閺勩劌銇?;
  return d.toLocaleDateString('zh-CN', { month:'short', day:'numeric' });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function updateStats() {
  const allBuilds = getAllBuilds();
  const total = allBuilds.length;
  const byCat = {};
  allBuilds.forEach(b => { byCat[b.category] = (byCat[b.category] || 0) + 1; });
  const parts = CATEGORIES.map(c => {
    const n = byCat[c.key] || 0;
    return `<span class="stat-item">${c.icon} <strong>${n}</strong></span>`;

}

// ============================================================
//  COPY CODE
// ============================================================
function copyCode(el) {
  const code = el.dataset.code;
  const toast = el.querySelector(".copied-toast");
  if (!code) return;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(code).catch(() => fallbackCopy(code));
  } else {
    fallbackCopy(code);
  }
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 1500);
}

function fallbackCopy(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed"; ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); } catch(e) {}
  document.body.removeChild(ta);
}

function copyQQ(el) {
  const qq = el.querySelector("strong");
  if (!qq) return;
  const text = qq.textContent;
  const toast = el.querySelector(".qq-toast");
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 1500);
}

      updateStats();

      if (filtered.length === 0) {
        gridEl.innerHTML = '<div class="empty-state"><div class="big-icon">棣冩憶</div><h3>鏉╂ɑ鐥呴張澶婂瀻娴滎偉绻冮弬瑙勵攳</h3><p>閻愮懓鍤崣鍏呯瑓鐟?棣冩憶 閹稿鎸抽崚鍡曢煩娴ｇ姷娈戦弨瑙勭仚闁板秶鐤?/p></div>';
        return;
      }
      gridEl.innerHTML = filtered.map((b, idx) => renderCard(b, idx)).join("");
      requestAnimationFrame(() => {
        document.querySelectorAll(".card").forEach(el => el.classList.add("visible"));
      });
    }
  });
});

init();
</script>
</body>
</html>
